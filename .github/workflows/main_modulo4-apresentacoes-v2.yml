# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - modulo4-apresentacoes-v2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🟢 PASSO NOVO: Ensinando o robô a usar Node.js para o Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      # 🟢 PASSO NOVO: Compilando o Frontend do seu Módulo 4
      # A VITE_API_URL garante que o seu React aponte para a URL correta na Azure
      - name: Install frontend dependencies and Build
        env:
          VITE_API_URL: https://modulo4-apresentacoes-v2.azurewebsites.net
        run: |
          cd frontend
          npm install
          npm run build

      # 🟢 PASSO NOVO: Juntando o Front com o Back e limpando o lixo pesado
      - name: Prepare static assets for deployment
        run: |
          mkdir -p static
          cp -R frontend/dist/* static/
          rm -rf frontend/node_modules
          rm -rf frontend/dist

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'modulo4-apresentacoes-v2'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_83BC7385E5AF4ACF9C60608A9283B43F }}